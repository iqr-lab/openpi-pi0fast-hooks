record:
  enabled: true
  dir: /nfs/roberts/scratch/pi_tkf6/as4643/policy_records
  add_timestamp: true
  async_write: true
  max_pending_writes: 4

hooks:
  enabled:
    - observation_input
    - token_spans
    - prefix_embeddings
    - prefix_final_hidden_state
    - prefix_gradients
    - action_chunks
    - raw_attention_weights
    - value_vectors
    - insight_metrics

  action_chunks:
    num_chunks: 8
    ace_temperature: 0.7

  raw_attention_weights:
    layers: [1, 16]

  value_vectors:
    layers: [1, 16]
